symbol: EURUSD
timeframe: 1h
entry_timeframe: 1h
htf_timeframe: 4h
pip_size: 0.0001
data:
  years_total: 5
  train_years: 1
  oos_years: 2
  data_dir: data/store
  source_timeframe: 15m
risk:
  sl_pct: 0.02
  min_rr: 2.0
  max_drawdown: 0.3
  max_consecutive_losses: 10
  max_concurrent_positions: 1
  max_trades_per_day: 3
backtest:
  spread_pips: 0.5
  slippage_pips: 0.3
  initial_equity: 10000.0
  sl_atr_multiplier: 1.3
optimize:
  min_trades_per_year: 30
  expert_trials: 80
  top_k: 1
  quarterly_remine: false
  portfolio_mode: false
  filter_mode: none
  select_mode: fitness
  best_mode: single_p1_none_fitness
  enforce_gate: false
  walk_forward:
    train_months: 3
    test_months: 2
    step_months: 2
fitness:
  min_win_rate: 0.45
  min_profit_factor: 1.0
  max_drawdown: 0.3
  min_monthly_stability: 0.35
  complexity_penalty: 0.01
oos_gate:
  min_win_rate: 0.4
  min_profit_factor: 1.0
  max_drawdown: 0.35
  min_monthly_stability: 0.3
  min_trades: 20
  max_win_rate_degradation: 0.25
monte_carlo:
  simulations: 300
  min_positive_pct: 0.5
