name: CI

on:
  push:
    paths:
      - "setup_trade/**"
  pull_request:
    paths:
      - "setup_trade/**"

defaults:
  run:
    working-directory: setup_trade

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Link market data from AI_Trade if present
        run: |
          mkdir -p data/market
          if [ -f ../AI_Trade/data/eurusd_h1.csv ]; then
            ln -sf ../../AI_Trade/data/eurusd_h1.csv data/market/eurusd_h1.csv
          fi
      - run: pip install -r requirements.txt
      - run: pytest
