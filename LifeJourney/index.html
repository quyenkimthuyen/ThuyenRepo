<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cognitive Mirror: Life Journey - A cognitive mirror that helps people see their own thinking patterns.">
  <title>Cognitive Mirror: Life Journey</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/vendor/chart.umd.min.js"></script>
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner"></div>
    <p id="loading-text">Đang tải...</p>
  </div>

  <div id="app" class="hidden">
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-icon">◉</span>
          <div>
            <h1 id="app-title">Cognitive Mirror</h1>
            <p id="app-subtitle" class="subtitle">Life Journey</p>
          </div>
        </div>
        <nav class="main-nav" id="main-nav">
          <button class="nav-btn active" data-view="journey" id="nav-journey"></button>
          <button class="nav-btn" data-view="dashboard" id="nav-dashboard"></button>
          <button class="nav-btn" data-view="timeline" id="nav-timeline"></button>
          <button class="nav-btn" data-view="simulation" id="nav-simulation"></button>
        </nav>
        <div class="header-actions">
          <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
          <div class="lang-toggle">
            <button class="lang-btn" data-lang="vi" id="lang-vi">VI</button>
            <button class="lang-btn" data-lang="en" id="lang-en">EN</button>
          </div>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section id="view-journey" class="view active">
        <div id="journey-content"></div>
      </section>

      <section id="view-dashboard" class="view">
        <p id="mirror-disclaimer" class="mirror-disclaimer"></p>
        <div class="dashboard-grid">
          <div class="card card-wide">
            <h2 id="dash-radar-title"></h2>
            <div class="chart-wrap">
              <canvas id="radar-chart"></canvas>
            </div>
          </div>
          <div class="card">
            <h2 id="dash-profile-title"></h2>
            <div id="profile-scores" class="profile-scores"></div>
          </div>
          <div class="card">
            <h2 id="dash-emotion-title"></h2>
            <div class="chart-wrap chart-sm" id="emotion-chart-wrap">
              <canvas id="emotion-chart"></canvas>
            </div>
          </div>
          <div class="card">
            <h2 id="dash-emotion-trend-title"></h2>
            <div class="chart-wrap chart-sm" id="emotion-trend-wrap">
              <canvas id="emotion-trend-chart"></canvas>
            </div>
          </div>
          <div class="card">
            <h2 id="dash-patterns-title"></h2>
            <div class="chart-wrap chart-sm" id="pattern-chart-wrap">
              <canvas id="pattern-chart"></canvas>
            </div>
            <div id="pattern-analysis" class="pattern-tags"></div>
          </div>
          <div class="card">
            <h2 id="dash-phrases-title"></h2>
            <div id="frequent-phrases"></div>
          </div>
          <div class="card card-wide">
            <h2 id="dash-mirror-title"></h2>
            <div id="ai-mirror" class="mirror-reflections"></div>
          </div>
          <div class="card card-wide">
            <h2 id="dash-map-title"></h2>
            <div id="life-journey-map" class="journey-map"></div>
          </div>
        </div>
      </section>

      <section id="view-timeline" class="view">
        <div class="timeline-header">
          <h2 id="timeline-title"></h2>
          <select id="timeline-filter" class="filter-select"></select>
        </div>
        <div id="timeline-list" class="timeline-list"></div>
        <div id="timeline-detail" class="timeline-detail hidden"></div>
      </section>

      <section id="view-simulation" class="view">
        <div class="simulation-intro">
          <h2 id="sim-title"></h2>
          <p id="sim-desc"></p>
        </div>
        <div id="sim-stages" class="stage-grid"></div>
      </section>
    </main>

    <footer class="app-footer">
      <p id="footer-text"></p>
    </footer>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-backdrop" id="settings-backdrop"></div>
    <div class="modal-content">
      <h2 id="settings-title"></h2>
      <p id="settings-about" class="settings-about"></p>
      <div class="settings-actions">
        <button class="btn btn-secondary" id="btn-export"></button>
        <label class="btn btn-secondary file-label">
          <span id="btn-import-label"></span>
          <input type="file" id="import-file" accept=".json" hidden>
        </label>
        <button class="btn btn-danger" id="btn-reset"></button>
      </div>
      <button class="btn btn-secondary modal-close" id="btn-close-settings"></button>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/mirror-engine.js"></script>
  <script src="js/profile-engine.js"></script>
  <script src="js/event-engine.js"></script>
  <script src="js/timeline-engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
