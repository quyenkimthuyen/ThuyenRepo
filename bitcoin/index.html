<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />

    <script type="importmap">
      {
        "imports": {
          "buffer": "https://esm.sh/buffer@6.0.3",
          "bitcoinjs-lib": "https://esm.sh/bitcoinjs-lib@6.1.7",

          "@bitcoinerlab/secp256k1": "https://esm.sh/@bitcoinerlab/secp256k1@1.2.0",
          "ecpair": "https://esm.sh/ecpair@2.1.0?deps=@bitcoinerlab/secp256k1@1.2.0",
          "qrcode": "https://esm.sh/qrcode@1.5.4"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">Đang tải ví Bitcoin...</div>
