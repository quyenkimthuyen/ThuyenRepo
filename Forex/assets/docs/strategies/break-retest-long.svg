<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-label="Break and Retest Long">
  <defs>
    <style>
      .bg { fill: #0f1419; }
      .grid { stroke: #1e2a38; stroke-width: 1; }
      .level { stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 6 4; }
      .wick { stroke: #8b9cb3; stroke-width: 2; }
      .bull { fill: #22c55e; stroke: #22c55e; }
      .bear { fill: #ef4444; stroke: #ef4444; }
      .label { fill: #c8d4e0; font: 600 13px Inter, sans-serif; }
      .note { fill: #8b9cb3; font: 12px Inter, sans-serif; }
      .entry { stroke: #3b82f6; stroke-width: 2; }
      .sl { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 4 3; }
      .tp { stroke: #22c55e; stroke-width: 2; stroke-dasharray: 4 3; }
      .arrow { fill: #3b82f6; }
    </style>
  </defs>
  <rect class="bg" width="720" height="320"/>
  <line class="grid" x1="40" y1="60" x2="680" y2="60"/>
  <line class="grid" x1="40" y1="120" x2="680" y2="120"/>
  <line class="grid" x1="40" y1="180" x2="680" y2="180"/>
  <line class="grid" x1="40" y1="240" x2="680" y2="240"/>
  <line class="level" x1="60" y1="150" x2="660" y2="150"/>
  <text class="label" x="62" y="142">Swing High (kháng cņ)  level</text>
  <!-- swing candles -->
  <line class="wick" x1="100" y1="170" x2="100" y2="130"/><rect class="bear" x="92" y="140" width="16" height="25"/>
  <line class="wick" x1="130" y1="175" x2="130" y2="125"/><rect class="bull" x="122" y="135" width="16" height="30"/>
  <line class="wick" x1="160" y1="168" x2="160" y2="128"/><rect class="bear" x="152" y="138" width="16" height="22"/>
  <!-- breakout -->
  <line class="wick" x1="220" y1="115" x2="220" y2="155"/><rect class="bull" x="212" y="125" width="16" height="28"/>
  <text class="note" x="200" y="108">Breakout: close e level + breakoutPips</text>
  <!-- pullback retest -->
  <line class="wick" x1="310" y1="165" x2="310" y2="135"/><rect class="bull" x="302" y="145" width="16" height="18"/>
  <text class="note" x="255" y="200">Retest chĄm vųng level + nŋn xác nh­n tng</text>
  <!-- continuation -->
  <line class="wick" x1="400" y1="120" x2="400" y2="160"/><rect class="bull" x="392" y="130" width="16" height="25"/>
  <line class="wick" x1="460" y1="100" x2="460" y2="145"/><rect class="bull" x="452" y="110" width="16" height="30"/>
  <!-- entry sl tp -->
  <line class="entry" x1="280" y1="163" x2="620" y2="163"/>
  <text class="label" x="625" y="167">Entry</text>
  <line class="sl" x1="280" y1="178" x2="620" y2="178"/>
  <text class="label" x="625" y="182" fill="#ef4444">SL</text>
  <line class="tp" x1="280" y1="95" x2="620" y2="95"/>
  <text class="label" x="625" y="99" fill="#22c55e">TP (RRŨR)</text>
  <polygon class="arrow" points="335,220 325,235 345,235"/>
  <text class="note" x="350" y="232">Tín hiĮu LONG tĄi nŋn retest</text>
</svg>
