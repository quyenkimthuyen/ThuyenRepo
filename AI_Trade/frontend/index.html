<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Trade Lab — EURUSD 1H</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <h1>AI Trade Lab</h1>
        <span class="subtitle">EURUSD · 1H · Label → Analyze → Backtest</span>
      </div>
      <div class="period-tabs" id="periodTabs"></div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="panel panel-setups">
          <div class="panel-head">
            <h2>Setups</h2>
            <span class="count-badge" id="setupCount">0</span>
          </div>
          <button type="button" class="btn primary block" id="btnNewSetup">＋ Setup mới</button>

          <div class="setup-editor hidden" id="editorPanel">
            <div class="mode-bar">
              <span class="mode-pill" id="modePill" data-mode="idle">Xem chart</span>
              <span class="rr-pill" id="rrPill">RR —</span>
            </div>

            <div id="activeBlock" class="editor-block">
              <div class="direction-row">
                <button type="button" class="btn dir-btn active" data-direction="long" id="btnLong">Long</button>
                <button type="button" class="btn dir-btn" data-direction="short" id="btnShort">Short</button>
              </div>

              <div id="newSteps" class="step-track hidden">
                <div class="step-item" data-step="entry"><span>1</span> Entry</div>
                <div class="step-line"></div>
                <div class="step-item" data-step="sl"><span>2</span> SL</div>
                <div class="step-line"></div>
                <div class="step-item" data-step="tp"><span>3</span> TP</div>
              </div>

              <div class="price-grid">
                <label class="price-field entry-field">
                  <span>Entry</span>
                  <input id="fieldEntry" readonly>
                </label>
                <label class="price-field sl-field">
                  <span>Stop Loss</span>
                  <input id="fieldSL" type="number" step="0.00001">
                </label>
                <label class="price-field tp-field">
                  <span>Take Profit</span>
                  <input id="fieldTP" type="number" step="0.00001">
                </label>
              </div>
              <label class="field-compact">Thời gian <input id="fieldTime" readonly></label>

              <details class="meta-details" open>
                <summary>Tags & ghi chú</summary>
                <label>Tags <input id="fieldTags" placeholder="pullback, retest"></label>
                <div class="preset-block">
                  <span class="preset-label">Tags nhanh</span>
                  <div id="tagPresets" class="chip-row"></div>
                </div>
                <label>Ghi chú <input id="fieldNote" placeholder="Mô tả setup..."></label>
                <div class="preset-block">
                  <span class="preset-label">Ghi chú mẫu</span>
                  <div id="notePresets" class="chip-row note-chips"></div>
                </div>
              </details>

              <div class="action-bar">
                <button type="button" class="btn primary" id="btnSave" disabled>Lưu setup</button>
                <button type="button" class="btn" id="btnCancel">Hủy</button>
                <button type="button" class="btn danger hidden" id="btnDelete">Xóa</button>
              </div>
            </div>
          </div>

          <div class="setup-list-section">
            <div class="setup-list-head">Đã lưu</div>
            <ul id="setupList" class="setup-list"></ul>
          </div>
        </section>

        <section class="panel panel-analyze">
          <h2>Chiến lược & Backtest</h2>
          <div class="btn-row">
            <button type="button" class="btn primary" id="btnAnalyze">Analyze</button>
            <button type="button" class="btn" id="btnBacktestVal">BT 2023</button>
            <button type="button" class="btn" id="btnBacktestTest">BT 2024–26</button>
          </div>
          <pre id="analysisOut" class="output"></pre>
          <pre id="backtestOut" class="output"></pre>
        </section>
      </aside>

      <section class="chart-area">
        <div class="chart-toolbar">
          <label><input type="checkbox" id="toggleEma50" checked> EMA 50</label>
          <label><input type="checkbox" id="toggleEma200" checked> EMA 200</label>
          <label><input type="checkbox" id="toggleRsi" checked> RSI 14</label>
          <span class="badge" id="periodBadge">Train 2022</span>
        </div>
        <div class="chart-wrap">
          <div id="chartMain" class="chart-main"></div>
          <div id="chartOverlayHint" class="chart-overlay-hint hidden"></div>
        </div>
        <div id="chartRsi" class="chart-rsi"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
