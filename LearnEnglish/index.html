        if (target.dataset.mode && target.classList.contains('tab')) selectQuizMode(target.dataset.mode);
        if (target.dataset.pronounce) pronounceWord(state.words.find((word) => word.id === target.dataset.pronounce));
        if (target.dataset.pronounceCurrent) playQuizAudio();
        if (target.dataset.reveal) state.revealed[target.dataset.reveal] = !state.revealed[target.dataset.reveal];
        if (target.dataset.forgot) {
          state.words = state.words.map((word) => word.id === target.dataset.forgot ? applyReviewOutcome(word, 'forgot') : word);
          reshuffleWordOrder();
          saveState();
        }
        if (target.dataset.remembered) {
          state.words = refillLearningQueue(state.words.map((word) => word.id === target.dataset.remembered ? applyReviewOutcome(word, 'remembered') : word));
          reshuffleWordOrder();
          saveState();
        }
        if (target.dataset.correctNext) {
          nextQuestion();
          return;
        }
        if (target.dataset.answer) answerQuestion(target.dataset.answer);
        if (target.id === 'themeButton') { state.theme = state.theme === 'dark' ? 'light' : 'dark'; saveState(); }
        if (target.id === 'startAutoLearn') {
          startAutoLearn();
          return;
        }
        if (target.id === 'stopAutoLearn') {
          stopAutoLearn();
          return;
        }
        if (target.id === 'togglePauseAutoLearn') {
          if (state.autoLearn.isPaused) {
            resumeAutoLearn();
          } else {
            pauseAutoLearn();
          }
          return;
        }
        if (target.id === 'startQuiz') startQuiz(state.quizMode);
        if (target.id === 'resetQuiz') resetQuizState();
        if (target.id === 'nextQuestion') {
          nextQuestion();
          return;
        }
        if (target.id === 'quizHint') {
          if (state.currentQuestion) {
            const answerLength = state.currentQuestion.answer.trim().length;
            state.quizHintPressCount = (state.quizHintPressCount || 0) + 1;
            state.currentQuestionHintPressCount = (state.currentQuestionHintPressCount || 0) + 1;
            state.quizHintRevealCount = Math.min(answerLength, (state.quizHintRevealCount || 0) + 2);
            const hintText = document.getElementById('hintText');
            if (hintText) {
              hintText.textContent = getQuizHint(state.currentQuestion.answer, state.quizHintRevealCount);
              hintText.classList.remove('hidden');
            }
          }
          const input = document.getElementById('typingAnswer');
          if (input) input.focus();
          return;
        }
        if (target.id === 'quizAnswerPeek') {
          peekQuizAnswer();
          const input = document.getElementById('typingAnswer');
          if (input) input.focus();
          return;
        }
        if (target.id === 'resetSavedState') {
          if (window.confirm('Reset all saved progress and reload fresh data?')) resetSavedState();
          return;
        }
        render();
      });



      document.addEventListener('change', async (event) => {
        if (event.target.id === 'topicSelect' || event.target.id === 'quizTopicSelect') {
          if (state.autoLearn.isPlaying) stopAutoLearn();
          state.topicFilter = event.target.value;
          state.filter = 'all';
          resetQuizState();
          saveState();
          render();
          return;
        }
        if (event.target.id === 'dataSourceSelect') {
          if (state.autoLearn.isPlaying) stopAutoLearn();
          const nextSource = event.target.value;
          if (!DATA_SOURCES.some((source) => source.name === nextSource)) return;
          state.dataSourceName = nextSource;
          state.topicFilter = 'all';
          state.searchQuery = '';
          state.filter = 'learning';
          resetQuizState();
          saveState();
          try {
            importTopics(await loadTopicFiles());
          } catch (error) {
            state.feedback = 'Cannot load the selected source file from data/. Please check the file exists and use Live Server.';
            console.warn('Cannot load selected source data.', error);
            render();
          }
          return;
        }
        if (event.target.id === 'quizQuestionLimitInput') {
          state.quizQuestionLimit = normalizeQuizQuestionLimit(event.target.value);
          resetQuizState();
          saveState();
          render();
          return;
        }
      });

      document.addEventListener('input', (event) => {
        if (event.target.id === 'autoLearnSlider') {
          seekAutoLearn(parseInt(event.target.value, 10));
          return;
        }
        if (event.target.id !== 'typingAnswer' || state.currentAnswer || !['typing', 'dictation'].includes(state.currentQuestion?.mode)) return;
        const typedAnswer = event.target.value;
        state.quizTypingDraft = typedAnswer;
        if (typedAnswer.trim().toLowerCase() === state.currentQuestion.answer.trim().toLowerCase()) {
          answerQuestion(typedAnswer);
        }
      });

      document.addEventListener('submit', (event) => {
        if (event.target.id !== 'typingForm') return;
        event.preventDefault();
        if (state.currentAnswer) {
          nextQuestion();
        } else {
          answerQuestion(document.getElementById('typingAnswer').value);
        }
      });

      initializeApp();
      setInterval(() => {
        if (state.page === 'quiz' && state.quizStartedAt) {
          const elapsedSpan = document.getElementById('quizElapsed');
          if (elapsedSpan) {
            const quizStats = getQuizStats();
            elapsedSpan.textContent = quizStats.elapsed;
          } else {
            renderQuiz();
          }
        }
      }, 1000);
    </script>
  </body>
</html>
