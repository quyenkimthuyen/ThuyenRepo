<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 720" role="img" aria-label="Break and Retest Long - doc">
  <defs>
    <style>
      .bg { fill: #0f1419; }
      .panel { fill: #151c26; stroke: #2a3548; stroke-width: 1; }
      .level { stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 5 4; }
      .wick { stroke: #8b9cb3; stroke-width: 2; }
      .bull { fill: #22c55e; stroke: #22c55e; }
      .bear { fill: #ef4444; stroke: #ef4444; }
      .title { fill: #e2e8f0; font: 700 14px Inter, sans-serif; }
      .step { fill: #3b82f6; font: 700 11px Inter, sans-serif; }
      .note { fill: #94a3b8; font: 11px Inter, sans-serif; }
      .entry { stroke: #3b82f6; stroke-width: 2; }
      .sl { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 4 3; }
      .tp { stroke: #22c55e; stroke-width: 2; stroke-dasharray: 4 3; }
    </style>
  </defs>
  <rect class="bg" width="380" height="720" rx="8"/>
  <text class="title" x="190" y="28" text-anchor="middle">Break &amp; Retest — LONG</text>

  <!-- Step 1 -->
  <rect class="panel" x="16" y="44" width="348" height="180" rx="6"/>
  <text class="step" x="28" y="64">? Swing High (kháng c?)</text>
  <line class="level" x1="40" y1="120" x2="340" y2="120"/>
  <text class="note" x="40" y="112">level = max(high) swingLookback n?n</text>
  <line class="wick" x1="100" y1="140" x2="100" y2="105"/><rect class="bear" x="92" y="115" width="14" height="20"/>
  <line class="wick" x1="140" y1="145" x2="140" y2="100"/><rect class="bull" x="132" y="108" width="14" height="25"/>
  <line class="wick" x1="180" y1="138" x2="180" y2="108"/><rect class="bear" x="172" y="115" width="14" height="18"/>
  <line class="wick" x1="260" y1="142" x2="260" y2="112"/><rect class="bull" x="252" y="118" width="14" height="20"/>

  <!-- Step 2 -->
  <rect class="panel" x="16" y="240" width="348" height="180" rx="6"/>
  <text class="step" x="28" y="260">? Breakout</text>
  <line class="level" x1="40" y1="310" x2="340" y2="310"/>
  <text class="note" x="40" y="302">close ? level + breakoutPips</text>
  <line class="wick" x1="120" y1="330" x2="120" y2="285"/><rect class="bull" x="112" y="292" width="14" height="30"/>
  <line class="wick" x1="200" y1="325" x2="200" y2="278"/><rect class="bull" x="192" y="285" width="14" height="32"/>
  <text class="note" x="220" y="300">Ch? retest</text>
  <text class="note" x="220" y="316">t?i ?a retestMaxBars</text>

  <!-- Step 3 -->
  <rect class="panel" x="16" y="436" width="348" height="200" rx="6"/>
  <text class="step" x="28" y="456">? Retest + tín hi?u LONG</text>
  <line class="level" x1="40" y1="500" x2="340" y2="500"/>
  <line class="wick" x1="160" y1="520" x2="160" y2="485"/><rect class="bull" x="152" y="492" width="14" height="22"/>
  <text class="note" x="180" y="498">Ch?m vůng level</text>
  <text class="note" x="180" y="514">+ n?n xác nh?n t?ng</text>
  <line class="entry" x1="50" y1="545" x2="330" y2="545"/>
  <text class="note" x="50" y="562" fill="#3b82f6">Entry = close n?n retest</text>
  <line class="sl" x1="50" y1="575" x2="330" y2="575"/>
  <text class="note" x="50" y="592" fill="#ef4444">SL d??i ?áy retest</text>
  <line class="tp" x1="50" y1="470" x2="330" y2="470"/>
  <text class="note" x="50" y="487" fill="#22c55e">TP = entry + RR × R</text>

  <text class="note" x="190" y="670" text-anchor="middle">Tín hi?u t?i n?n retest — không ph?i n?n breakout</text>
  <text class="note" x="190" y="690" text-anchor="middle">Quá retestMaxBars ho?c phá invalidation ? h?y setup</text>
</svg>
