<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RootWord Map - Học từ vựng qua cấu tạo từ</title>
  <style>
    :root {
      --root: #2563eb;
      --prefix: #7c3aed;
      --suffix: #f97316;
      --meaning: #16a34a;
      --ink: #172033;
      --muted: #667085;
      --line: #dbe3f0;
      --panel: rgba(255, 255, 255, 0.9);
      --shadow: 0 20px 60px rgba(32, 52, 89, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.16), transparent 30rem),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.16), transparent 26rem),
        linear-gradient(135deg, #f8fbff 0%, #eef4ff 100%);
    }

    button, input { font: inherit; }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 28px;
      align-items: center;
      padding: 34px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.72));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 4.7rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }

    .hero p {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(219, 227, 240, 0.9);
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #344054;
      font-weight: 700;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 999px;
      box-shadow: 0 0 0 5px currentColor;
      opacity: 0.22;
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      margin: 22px 0;
      padding: 12px;
      border: 1px solid rgba(219, 227, 240, 0.9);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 36px rgba(32, 52, 89, 0.08);
      backdrop-filter: blur(16px);
    }

    .tag {
      border: 1px solid rgba(37, 99, 235, 0.14);
      border-radius: 999px;
      color: #344054;
      background: #fff;
      font-weight: 850;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 8px;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .search {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid #d8e0ee;
      border-radius: 16px;
      outline: none;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search:focus {
      border-color: var(--root);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .ghost-btn {
      border: 0;
      border-radius: 16px;
      padding: 0 18px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, var(--root), var(--prefix));
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .ghost-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.24);
    }

    .view-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: -8px 0 22px;
      padding: 12px;
      border: 1px solid rgba(219, 227, 240, 0.95);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 34px rgba(32, 52, 89, 0.08);
      backdrop-filter: blur(16px);
    }

    .tab-btn {
      flex: 1 1 150px;
      border: 1px solid transparent;
      border-radius: 18px;
      min-height: 52px;
      padding: 13px 16px;
      color: var(--muted);
      text-align: center;
      font-weight: 900;
      cursor: pointer;
      background: transparent;
      transition: transform 0.2s, color 0.2s, background 0.2s, border-color 0.2s;
    }

    .tab-btn:hover,
    .tab-btn.active {
      transform: translateY(-1px);
      color: var(--root);
      border-color: rgba(37, 99, 235, 0.22);
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.11), rgba(124, 58, 237, 0.08));
    }

    .view-section {
      display: none;
    }

    .view-section.active {
      display: grid;
      gap: 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(219, 227, 240, 0.95);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .sidebar {
      position: sticky;
      top: 106px;
      padding: 18px;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin: 0 0 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }

    .section-title small {
      color: var(--muted);
      font-weight: 700;
    }

    .root-list {
      display: grid;
      gap: 10px;
      max-height: 68vh;
      overflow: auto;
      padding-right: 4px;
    }

    .root-card {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 14px;
      border: 1px solid transparent;
      border-radius: 18px;
      color: inherit;
      text-align: left;
      cursor: pointer;
      background: #fff;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .root-card:hover,
    .root-card.active {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.28);
      box-shadow: 0 12px 26px rgba(37, 99, 235, 0.11);
    }

    .root-card.active {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(255, 255, 255, 0.96));
    }

    .root-name {
      color: var(--root);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .root-meaning {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .count-pill {
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--root);
      background: rgba(37, 99, 235, 0.1);
      font-weight: 900;
      font-size: 0.82rem;
    }

    .content {
      display: grid;
      gap: 22px;
    }

    .root-board {
      padding: 24px;
      overflow: hidden;
    }

    .board-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }

    .board-head h2 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      letter-spacing: -0.05em;
      color: var(--root);
    }

    .board-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .meaning-badge {
      padding: 12px 16px;
      border-radius: 18px;
      color: var(--meaning);
      background: rgba(22, 163, 74, 0.11);
      font-weight: 900;
      text-align: center;
    }

    .mindmap {
      position: relative;
      display: grid;
      grid-template-columns: minmax(160px, 220px) 1fr;
      gap: 28px;
      align-items: center;
      padding: 18px 0;
    }

    .mindmap::before {
      content: "";
      position: absolute;
      left: 170px;
      right: 28px;
      top: 50%;
      border-top: 2px dashed var(--line);
    }

    .central-node {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 178px;
      border-radius: 50%;
      color: white;
      text-align: center;
      background: radial-gradient(circle at 30% 20%, #60a5fa, var(--root));
      box-shadow: 0 24px 45px rgba(37, 99, 235, 0.28);
    }

    .central-node strong {
      display: block;
      font-size: 1.65rem;
      letter-spacing: -0.03em;
    }

    .central-node span {
      display: block;
      margin-top: 6px;
      opacity: 0.9;
      font-weight: 700;
    }

    .word-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .word-card {
      border: 1px solid #dde7f4;
      border-radius: 22px;
      padding: 16px;
      background: #fff;
      cursor: pointer;
      transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
    }

    .word-card:hover,
    .word-card.active {
      transform: translateY(-4px);
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 18px 34px rgba(32, 52, 89, 0.12);
    }

    .word-card h3 {
      margin: 0 0 10px;
      font-size: 1.28rem;
      letter-spacing: -0.03em;
    }

    .formula {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
    }

    .part {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      font-size: 0.85rem;
      font-weight: 900;
    }

    .part.prefix { background: var(--prefix); }
    .part.root { background: var(--root); }
    .part.suffix { background: var(--suffix); }
    .part.meaning { background: var(--meaning); }
    .plus { color: #98a2b3; font-weight: 900; }

    .word-meaning {
      margin: 0;
      color: var(--meaning);
      font-weight: 800;
      line-height: 1.5;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.75fr);
      gap: 22px;
    }

    .guide-card {
      padding: 22px;
    }

    .usage-card {
      padding: 22px;
    }

    .contrast-card {
      padding: 22px;
    }

    .scenario-card {
      padding: 22px;
    }

    .guide-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .usage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .usage-card .usage-grid,
    .scenario-card .usage-grid,
    .contrast-card .contrast-grid {
      grid-template-columns: 1fr;
    }

    .usage-group {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid #e4ebf6;
      border-radius: 20px;
      background: #fff;
    }

    .usage-group h3 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: -0.02em;
    }

    .usage-group > p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .usage-item {
      padding: 12px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #e6edf7;
    }

    .usage-item strong {
      color: var(--root);
      font-size: 1.02rem;
    }

    .usage-item p {
      margin: 6px 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .usage-item em {
      display: block;
      color: var(--meaning);
      font-style: normal;
      font-weight: 750;
      line-height: 1.45;
    }

    .contrast-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .contrast-group {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid #e4ebf6;
      border-radius: 20px;
      background: #fff;
    }

    .contrast-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 900;
    }

    .contrast-vs {
      flex: 0 0 auto;
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, var(--root), var(--suffix));
      font-size: 0.78rem;
    }

    .contrast-sides {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .contrast-side {
      padding: 13px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #e6edf7;
    }

    .contrast-side strong {
      display: block;
      margin-bottom: 6px;
      font-size: 1.2rem;
      letter-spacing: -0.03em;
    }

    .contrast-side.good strong {
      color: var(--meaning);
    }

    .contrast-side.bad strong {
      color: #dc2626;
    }

    .contrast-side p,
    .contrast-note {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .guide-column {
      padding: 16px;
      border: 1px solid #e4ebf6;
      border-radius: 20px;
      background: #fff;
    }

    .guide-column h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .mini-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .mini-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 13px;
      color: var(--muted);
      background: #f8fbff;
      line-height: 1.35;
    }

    .mini-list strong {
      color: var(--ink);
    }

    .detail-card,
    .quiz-card {
      padding: 22px;
    }

    .detail-card h2,
    .quiz-card h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
    }

    .split-word {
      margin: 10px 0 18px;
      font-size: clamp(1.7rem, 4vw, 3rem);
      font-weight: 950;
      letter-spacing: -0.06em;
    }

    .part-table {
      display: grid;
      gap: 10px;
    }

    .part-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #e4ebf6;
    }

    .part-row p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .family {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .family button {
      border: 1px solid #dce6f3;
      border-radius: 999px;
      padding: 9px 12px;
      color: #344054;
      font-weight: 800;
      cursor: pointer;
      background: #fff;
      transition: transform 0.2s, color 0.2s, border-color 0.2s;
    }

    .family button:hover {
      transform: translateY(-2px);
      color: var(--root);
      border-color: rgba(37, 99, 235, 0.4);
    }

    .quiz-card {
      display: grid;
      gap: 14px;
    }

    .quiz-type {
      width: fit-content;
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--prefix);
      background: rgba(124, 58, 237, 0.1);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .question {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 850;
      line-height: 1.5;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    .answer {
      border: 1px solid #dce6f3;
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      background: #fff;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
    }

    .answer:hover {
      transform: translateY(-2px);
      border-color: rgba(37, 99, 235, 0.35);
    }

    .answer.correct {
      border-color: rgba(22, 163, 74, 0.45);
      background: rgba(22, 163, 74, 0.1);
    }

    .answer.wrong {
      border-color: rgba(239, 68, 68, 0.45);
      background: rgba(239, 68, 68, 0.08);
    }

    .explain {
      display: none;
      margin: 0;
      padding: 12px;
      border-radius: 16px;
      color: #166534;
      background: rgba(22, 163, 74, 0.1);
      line-height: 1.55;
    }

    .explain.show { display: block; }

    .empty {
      padding: 28px;
      border: 1px dashed #c7d4e6;
      border-radius: 22px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.65);
    }

    mark {
      color: inherit;
      background: rgba(250, 204, 21, 0.38);
      border-radius: 6px;
      padding: 0 3px;
    }

    @media (max-width: 920px) {
      .hero,
      .layout,
      .detail-grid,
      .guide-grid,
      .usage-grid,
      .contrast-grid {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .root-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-height: none;
      }

      .mindmap {
        grid-template-columns: 1fr;
      }

      .mindmap::before {
        left: 50%;
        right: auto;
        top: 170px;
        bottom: 30px;
        border-top: 0;
        border-left: 2px dashed var(--line);
      }

      .central-node {
        width: min(220px, 70vw);
        justify-self: center;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .hero,
      .root-board,
      .detail-card,
      .quiz-card,
      .usage-card,
      .contrast-card,
      .scenario-card {
        padding: 18px;
        border-radius: 22px;
      }

      .contrast-sides {
        grid-template-columns: 1fr;
      }

      .toolbar {
        grid-template-columns: 1fr;
        position: static;
      }

      .ghost-btn {
        min-height: 48px;
      }

      .tab-btn {
        flex: 1 1 100%;
      }

      .root-list,
      .word-grid,
      .legend {
        grid-template-columns: 1fr;
      }

      .board-head,
      .part-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <h1>RootWord Map</h1>
        <p>Học từ vựng tiếng Anh bằng cách nhìn thấy cấu tạo của từ: tiền tố, gốc từ, hậu tố, nghĩa gốc và các từ cùng họ trong một bản đồ trực quan.</p>
      </div>
      <div class="legend" aria-label="Chú giải màu sắc">
        <span><i class="dot" style="color: var(--root)"></i>Gốc từ</span>
        <span><i class="dot" style="color: var(--prefix)"></i>Tiền tố</span>
        <span><i class="dot" style="color: var(--suffix)"></i>Hậu tố</span>
        <span><i class="dot" style="color: var(--meaning)"></i>Nghĩa</span>
      </div>
    </section>

    <section class="toolbar" aria-label="Tìm kiếm">
      <input id="searchInput" class="search" type="search" placeholder="Tìm gốc từ hoặc từ vựng: port, transport, spect..." />
      <button id="randomQuizBtn" class="ghost-btn" type="button">Quiz mới</button>
    </section>

    <nav class="view-tabs" aria-label="Chọn chế độ học">
      <button class="tab-btn active" type="button" data-view="roots">Root Map</button>
      <button class="tab-btn" type="button" data-view="usage">Từ gần nghĩa</button>
      <button class="tab-btn" type="button" data-view="contrast">Trái nghĩa gốc</button>
      <button class="tab-btn" type="button" data-view="scenario">Tình huống</button>
      <button class="tab-btn" type="button" data-view="topicWords">Chủ đề từ vựng</button>
      <button class="tab-btn" type="button" data-view="quiz">Quiz luyện tập</button>
    </nav>

    <section class="layout">
      <aside class="panel sidebar">
        <div class="section-title">
          <h2 id="sidebarTitle">Gốc từ phổ biến</h2>
          <small id="rootCount"></small>
        </div>
        <div id="rootList" class="root-list"></div>
      </aside>

      <div class="content">
        <section class="view-section active" data-view-panel="roots">
          <section id="rootBoard" class="panel root-board"></section>
          <section id="learningGuide" class="panel guide-card"></section>
          <article id="wordDetail" class="panel detail-card"></article>
        </section>

        <section class="view-section" data-view-panel="usage">
          <section id="usageGuide" class="panel usage-card"></section>
        </section>

        <section class="view-section" data-view-panel="contrast">
          <section id="contrastGuide" class="panel contrast-card"></section>
        </section>

    function normalize(text) {
      return text.toLowerCase().trim();
    }

    function highlight(text) {
      if (!state.query) return text;
      const safeQuery = state.query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return text.replace(new RegExp(`(${safeQuery})`, "ig"), "<mark>$1</mark>");
    }

    function partFormula(parts) {
      return parts.map((part, index) => `
        ${index ? '<span class="plus">+</span>' : ""}
        <span class="part ${part.type}">${part.text}</span>
      `).join("");
    }

    function topicLabel(topicId) {
      return TOPICS.find(topic => topic.id === topicId)?.label || topicId;
    }

    function textForTopic(item, type) {
      if (type === "root") {
        return `${item.root} ${item.meaning} ${item.note} ${item.words.map(word => `${word.word} ${word.meaning} ${word.parts.map(part => `${part.text} ${part.meaning}`).join(" ")}`).join(" ")}`;
      }
      if (type === "usage") {
        return `${item.title} ${item.idea} ${item.items.map(entry => `${entry.word} ${entry.use} ${entry.example}`).join(" ")}`;
      }
      if (type === "contrast") {
        return `${item.title} ${item.note} ${item.left.word} ${item.left.meaning} ${item.left.example} ${item.right.word} ${item.right.meaning} ${item.right.example}`;
      }
      if (type === "scenario") {
        return `${item.title} ${item.goal} ${item.items.map(entry => `${entry.phrase} ${entry.use} ${entry.example}`).join(" ")}`;
      }
      if (type === "topicWords") {
        return `${item.title} ${item.goal} ${item.items.map(entry => `${entry.phrase} ${entry.use} ${entry.example}`).join(" ")}`;
      }
      return `${item.type} ${item.question} ${item.answers.join(" ")} ${item.explain}`;
    }

    function getTopics(item, type) {
      const text = textForTopic(item, type).toLowerCase();
      const matched = TOPICS
        .filter(topic => topic.id !== "all")
        .filter(topic => TOPIC_RULES[topic.id].some(keyword => text.includes(keyword.toLowerCase())))
        .map(topic => topic.id);
      return matched.length ? matched : ["daily"];
    }

    function matchesSelectedTopic(item, type) {
      return true;
    }

    function renderTags(item, type) {
      return "";
    }

      // Topic category chips were removed; main learning tabs now drive navigation.
    }

    function filterRoots() {
      const query = normalize(state.query);

      return rootData.filter(item => {
        if (!matchesSelectedTopic(item, "root")) return false;
        if (!query) return true;
        const rootMatch = `${item.root} ${item.meaning} ${item.note}`.toLowerCase().includes(query);
        const wordMatch = item.words.some(word =>
          `${word.word} ${word.meaning} ${word.parts.map(part => `${part.text} ${part.meaning}`).join(" ")}`.toLowerCase().includes(query)
        );
        return rootMatch || wordMatch;
      });
    }

    function filterUsageGroups() {
      const query = normalize(state.query);
      return APP_DATA.usageGroups
        .map((group, index) => ({ group, index }))
        .filter(({ group }) => {
          if (!matchesSelectedTopic(group, "usage")) return false;
          if (!query) return true;
          const groupText = `${group.title} ${group.idea} ${group.items.map(item => `${item.word} ${item.use} ${item.example}`).join(" ")}`;
          return groupText.toLowerCase().includes(query);
        });
    }

          const groupText = `${group.title} ${group.note} ${group.left.word} ${group.left.meaning} ${group.left.example} ${group.right.word} ${group.right.meaning} ${group.right.example}`;

          <small>${groups.length}/${APP_DATA.usageGroups.length} nhóm dễ nhầm</small>
        </div>
        ${selected ? `
        <div class="usage-grid">
          <article class="usage-group">
            <h3>${selected.group.title}</h3>
            ${renderTags(selected.group, "usage")}
            <p>${selected.group.idea}</p>
            ${selected.group.items.map(item => `
              <div class="usage-item">
                <strong>${item.word}</strong>
                <p>${item.use}</p>
                <em>${item.example}</em>
              </div>
            `).join("")}
          </article>
        </div>
        ` : '<div class="empty">Không tìm thấy nhóm từ gần nghĩa phù hợp.</div>'}
      `;
    }

    function renderContrastGuide() {
      const groups = filterAntonymGroups();
      const selected = groups.find(({ index }) => index === state.selectedAntonymIndex) || groups[0];

      contrastGuide.innerHTML = `
        <div class="section-title">
          <h2>Gốc/từ trái nghĩa tự nhiên</h2>
          <small>${groups.length}/${APP_DATA.antonymGroups.length} cặp đối lập</small>
        </div>
        ${selected ? `
        <div class="contrast-grid">
          <article class="contrast-group">
            <div class="contrast-head">
              <span>${selected.group.title}</span>
              <span class="contrast-vs">NOT prefix-made</span>
            </div>
            ${renderTags(selected.group, "contrast")}
            <div class="contrast-sides">
              <div class="contrast-side good">
                <strong>${selected.group.left.word}</strong>
                <p>${selected.group.left.meaning}</p>
                <p>${selected.group.left.example}</p>
              </div>
              <div class="contrast-side bad">
                <strong>${selected.group.right.word}</strong>
                <p>${selected.group.right.meaning}</p>
                <p>${selected.group.right.example}</p>
              </div>
            </div>
            <p class="contrast-note">${selected.group.note}</p>
          </article>
        </div>
        ` : '<div class="empty">Không tìm thấy cặp trái nghĩa phù hợp.</div>'}
      `;
    }

    function renderScenarioGuide() {
      const groups = filterScenarioGroups();
      const selected = groups.find(({ index }) => index === state.selectedScenarioIndex) || groups[0];

      scenarioGuide.innerHTML = `
        <div class="section-title">
          <h2>Tình huống giao tiếp</h2>
          <small>${groups.length}/${APP_DATA.scenarioGroups.length} nhóm tình huống</small>
        </div>
        ${selected ? `
        <div class="usage-grid">
          <article class="usage-group">
            <h3>${selected.group.title}</h3>
            ${renderTags(selected.group, "scenario")}
            <p>${selected.group.goal}</p>
            ${selected.group.items.map(item => `
              <div class="usage-item">
                <strong>${item.phrase}</strong>
                <p>${item.use}</p>
                <em>${item.example}</em>
              </div>
            `).join("")}
          </article>
        </div>
        ` : '<div class="empty">Không tìm thấy tình huống phù hợp.</div>'}
      `;
    }

    function renderTopicWordsGuide() {
      const groups = filterTopicWordGroups();
      const selected = groups.find(({ index }) => index === state.selectedTopicGroupIndex) || groups[0];

      topicWordsGuide.innerHTML = `
        <div class="section-title">
          <h2>Chủ đề từ vựng</h2>
          <small>${groups.length}/${APP_DATA.topicGroups.length} nhóm chủ đề</small>
        </div>
        ${selected ? `
        <div class="usage-grid">
          <article class="usage-group">
            <h3>${selected.group.title}</h3>
            ${renderTags(selected.group, "topicWords")}
            <p>${selected.group.goal}</p>
            ${selected.group.items.map(item => `
              <div class="usage-item">
                <strong>${item.phrase}</strong>
                <p>${item.use}</p>
                <em>${item.example}</em>
              </div>
            `).join("")}
          </article>
        </div>
        ` : '<div class="empty">Không tìm thấy chủ đề từ vựng phù hợp.</div>'}
      `;
    }

    function renderQuiz() {
      const quiz = quizData[state.quizIndex];
      quizBox.innerHTML = `
        <span class="quiz-type">${quiz.type}</span>
        <h2>Quiz luyện tập</h2>
        ${renderTags(quiz, "quiz")}
        <p class="question">${quiz.question}</p>
        <div class="answers">
          ${quiz.answers.map((answer, index) => `
            <button class="answer" type="button" data-answer="${index}">${answer}</button>
          `).join("")}
        </div>
        <p id="quizExplain" class="explain">${quiz.explain}</p>
      `;
    }

    function selectRoot(rootName) {
      const nextRoot = rootData.find(item => item.root === rootName);
      if (!nextRoot) return;
      state.selectedRoot = nextRoot;
      state.selectedWord = nextRoot.words[0];
      renderAll();
    }

    function selectWord(wordName) {
      const nextWord = state.selectedRoot.words.find(item => item.word === wordName);
      if (!nextWord) return;
      state.selectedWord = nextWord;
      renderBoard();
      renderDetail();
    }

    function selectUsageGroup(index) {
      state.selectedUsageIndex = index;
      renderRootList();
      renderUsageGuide();
    }

    function selectAntonymGroup(index) {
      state.selectedAntonymIndex = index;
      renderRootList();
      renderContrastGuide();
    }

    function selectScenarioGroup(index) {
      state.selectedScenarioIndex = index;
      renderRootList();
      renderScenarioGuide();
    }

    function selectTopicWordGroup(index) {
      state.selectedTopicGroupIndex = index;
      renderRootList();
      renderTopicWordsGuide();
    }

    function selectQuiz(index) {
      state.quizIndex = index;
      renderRootList();
      renderQuiz();
    }

    function checkAnswer(index) {
      const quiz = quizData[state.quizIndex];
      quizBox.querySelectorAll(".answer").forEach(button => {
        const answerIndex = Number(button.dataset.answer);
        button.disabled = true;
        if (answerIndex === quiz.correct) button.classList.add("correct");
        if (answerIndex === index && answerIndex !== quiz.correct) button.classList.add("wrong");
      });
      document.getElementById("quizExplain").classList.add("show");
    }

    function nextQuiz() {
      state.quizIndex = (state.quizIndex + 1) % quizData.length;
      renderQuiz();
      setActiveView("quiz");
    }

    function setActiveView(viewName) {
      state.activeView = viewName;
      tabButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.view === viewName);
      });
      viewPanels.forEach(panel => {
        panel.classList.toggle("active", panel.dataset.viewPanel === viewName);
      });
      renderRootList();
    }

    function syncSearchSelection() {
      if (state.activeView === "usage") {
        const groups = filterUsageGroups();
        if (groups.length && !groups.some(({ index }) => index === state.selectedUsageIndex)) {
          state.selectedUsageIndex = groups[0].index;
        }
        return;
      }

      if (state.activeView === "contrast") {
        const groups = filterAntonymGroups();
        if (groups.length && !groups.some(({ index }) => index === state.selectedAntonymIndex)) {
          state.selectedAntonymIndex = groups[0].index;
        }
        return;
      }

      if (state.activeView === "scenario") {
        const groups = filterScenarioGroups();
        if (groups.length && !groups.some(({ index }) => index === state.selectedScenarioIndex)) {
          state.selectedScenarioIndex = groups[0].index;
        }
        return;
      }

      if (state.activeView === "topicWords") {
        const groups = filterTopicWordGroups();
        if (groups.length && !groups.some(({ index }) => index === state.selectedTopicGroupIndex)) {
          state.selectedTopicGroupIndex = groups[0].index;
        }
        return;
      }

      if (state.activeView === "quiz") {
        const quizzes = filterQuizzes();
        if (quizzes.length && !quizzes.some(({ index }) => index === state.quizIndex)) {
          state.quizIndex = quizzes[0].index;
        }
        return;
      }

      const roots = filterRoots();
      if (!roots.length) return;
      if (!roots.some(item => item.root === state.selectedRoot.root)) {
        state.selectedRoot = roots[0];
        state.selectedWord = roots[0].words[0];
      }

      const query = normalize(state.query);
      if (!query) return;

      const matchedWord = state.selectedRoot.words.find(word =>
        `${word.word} ${word.meaning}`.toLowerCase().includes(query)
      );
      if (matchedWord) state.selectedWord = matchedWord;
    }

    function applyTopicFilter(topicId) {
      state.selectedTopic = topicId;
      renderTopicFilter();
      syncSearchSelection();
      renderAll();
    }

    function renderAll() {
      renderTopicFilter();
      renderRootList();
      renderBoard();
      renderLearningGuide();
      renderUsageGuide();
      renderContrastGuide();
      renderScenarioGuide();
      renderTopicWordsGuide();
      renderDetail();
      renderQuiz();
      setActiveView(state.activeView);
    }

    rootList.addEventListener("click", event => {
      const sidebarItem = event.target.closest("[data-sidebar-type]");
      if (sidebarItem) {
        const index = Number(sidebarItem.dataset.index);
        if (sidebarItem.dataset.sidebarType === "usage") selectUsageGroup(index);
        if (sidebarItem.dataset.sidebarType === "contrast") selectAntonymGroup(index);
        if (sidebarItem.dataset.sidebarType === "scenario") selectScenarioGroup(index);
        if (sidebarItem.dataset.sidebarType === "topicWords") selectTopicWordGroup(index);
        if (sidebarItem.dataset.sidebarType === "quiz") selectQuiz(index);
        return;
      }

      const card = event.target.closest("[data-root]");
      if (card) selectRoot(card.dataset.root);
    });

    rootBoard.addEventListener("click", event => {
      const card = event.target.closest("[data-word]");
      if (card) selectWord(card.dataset.word);
    });

    wordDetail.addEventListener("click", event => {
      const familyButton = event.target.closest("[data-family-word]");
      if (familyButton) selectWord(familyButton.dataset.familyWord);
    });

    quizBox.addEventListener("click", event => {
      const answer = event.target.closest("[data-answer]");
      if (answer) checkAnswer(Number(answer.dataset.answer));
    });

    randomQuizBtn.addEventListener("click", nextQuiz);

    tabButtons.forEach(button => {
      button.addEventListener("click", () => {
        setActiveView(button.dataset.view);
        syncSearchSelection();
        renderAll();
      });
    });

    searchInput.addEventListener("input", event => {
      state.query = event.target.value;
      syncSearchSelection();
      renderRootList();
      renderBoard();
      renderLearningGuide();
      renderUsageGuide();
      renderContrastGuide();
      renderScenarioGuide();
      renderTopicWordsGuide();
      renderDetail();
      renderQuiz();
    });

    renderAll();
  </script>
</body>
</html>
